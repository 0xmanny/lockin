name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [arm64, amd64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build
        working-directory: cli
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -trimpath \
            -o ../lockin-darwin-${{ matrix.goarch }} .

      - name: Generate checksum
        run: shasum -a 256 lockin-darwin-${{ matrix.goarch }} > lockin-darwin-${{ matrix.goarch }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: lockin-darwin-${{ matrix.goarch }}
          path: |
            lockin-darwin-${{ matrix.goarch }}
            lockin-darwin-${{ matrix.goarch }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            lockin-darwin-arm64
            lockin-darwin-arm64.sha256
            lockin-darwin-amd64
            lockin-darwin-amd64.sha256
